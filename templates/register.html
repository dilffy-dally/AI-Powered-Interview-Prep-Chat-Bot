{% extends 'base.html' %}
{% block title %}Register — PrepAI{% endblock %}
{% block body %}
<nav>
  <a href="{% url 'landing' %}" class="logo">PrepAI</a>
</nav>
<div class="auth-wrap">
  <div class="auth-card">
    <div class="auth-title">Create account ✨</div>
    <div class="auth-sub">Join thousands of job seekers who prep smarter</div>

    {% if error %}
    <div class="error-msg">⚠️ {{ error }}</div>
    {% endif %}

    <form method="POST">
      {% csrf_token %}
      <label>Username</label>
      <input type="text" name="username" placeholder="choose_a_username" autocomplete="username" required>
      <label>Password</label>
      <input type="password" name="password1" placeholder="min. 6 characters" autocomplete="new-password" required>
      <label>Confirm Password</label>
      <input type="password" name="password2" placeholder="repeat password" autocomplete="new-password" required>
      <button type="submit" class="btn-submit">Create Account →</button>
    </form>

    <div class="auth-link">
      Already have an account? <a href="{% url 'login' %}">Sign in</a>
    </div>
  </div>
</div>
{% endblock %}
