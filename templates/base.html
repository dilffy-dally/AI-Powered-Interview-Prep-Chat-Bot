<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}PrepAI{% endblock %}</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<!-- Preconnect for faster font loading -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<style>
  :root {
    --c1: #7c3aed;
    --c2: #06b6d4;
    --c3: #34d399;
    --c4: #f87171;
    --bg: #0a0a0f;
    --surface: #1a1a2e;
    --surface2: #23232f;
    --border: #2d2d44;
    --text: #f9fafb;
    --muted: #6b7280;
    --muted2: #9ca3af;
    --shadow: 0 8px 32px rgba(124,58,237,0.15);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed; inset: 0; z-index: 0; pointer-events: none;
    background:
      radial-gradient(ellipse 700px 500px at 0% 0%,   rgba(124,58,237,0.07) 0%, transparent 70%),
      radial-gradient(ellipse 500px 400px at 100% 10%, rgba(6,182,212,0.05) 0%, transparent 65%),
      radial-gradient(ellipse 600px 400px at 60% 100%, rgba(52,211,153,0.04) 0%, transparent 70%);
  }

  /* ── APP NAV ── */
  .app-nav {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 40px;
    background: rgba(10,10,15,0.92);
    backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
  }

  .logo {
    font-family: 'Syne', sans-serif;
    font-size: 22px; font-weight: 800;
    background: linear-gradient(135deg, #a78bfa, #06b6d4);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    text-decoration: none; letter-spacing: -0.5px;
  }

  .nav-right { display: flex; align-items: center; gap: 4px; }

  .nav-link {
    padding: 7px 16px; border-radius: 999px;
    color: var(--muted2); text-decoration: none;
    font-size: 14px; font-weight: 500; transition: all 0.2s;
  }
  .nav-link:hover  { color: #a78bfa; background: rgba(124,58,237,0.10); }
  .nav-link.active { color: #a78bfa; background: rgba(124,58,237,0.14); font-weight: 600; }

  .nav-avatar {
    width: 34px; height: 34px; border-radius: 50%;
    background: linear-gradient(135deg, #7c3aed, #06b6d4);
    display: flex; align-items: center; justify-content: center;
    font-family: 'Syne', sans-serif; font-size: 13px; font-weight: 800; color: #fff;
    margin-left: 6px;
  }

  .btn-logout {
    padding: 7px 16px; border-radius: 999px;
    border: 1.5px solid rgba(248,113,113,0.25);
    color: #f87171; text-decoration: none;
    font-size: 13px; font-weight: 500; transition: all 0.2s;
    margin-left: 4px;
  }
  .btn-logout:hover { background: rgba(248,113,113,0.08); border-color: #f87171; }

  /* ── AUTH NAV (landing / login / register) ── */
  nav:not(.app-nav) {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    display: flex; align-items: center; padding: 18px 60px;
    background: rgba(10,10,15,0.92);
    backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
  }

  /* ── PAGE WRAPPER ── */
  .page {
    position: relative; z-index: 1;
    padding-top: 70px;
  }

  /* ── AUTH PAGES ── */
  .auth-wrap {
    min-height: 100vh; display: flex; align-items: center; justify-content: center;
    padding: 100px 24px 60px;
    position: relative; z-index: 1;
  }

  .auth-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 24px; padding: 44px 40px;
    width: 100%; max-width: 420px;
    backdrop-filter: blur(20px);
    box-shadow: 0 8px 40px rgba(124,58,237,0.12);
  }

  .auth-title {
    font-family: 'Syne', sans-serif; font-size: 26px; font-weight: 800;
    color: var(--text); margin-bottom: 6px; letter-spacing: -0.5px;
  }

  .auth-sub { color: var(--muted); font-size: 15px; margin-bottom: 32px; }

  .auth-card label {
    display: block; font-size: 11px; font-weight: 700;
    letter-spacing: 2px; text-transform: uppercase;
    color: var(--muted); margin-bottom: 8px; margin-top: 20px;
  }
  .auth-card label:first-of-type { margin-top: 0; }

  .auth-card input {
    width: 100%; padding: 13px 18px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 12px; color: var(--text); font-size: 15px;
    font-family: 'DM Sans', sans-serif; outline: none;
    transition: border-color 0.2s;
  }
  .auth-card input:focus  { border-color: var(--c1); box-shadow: 0 0 0 3px rgba(124,58,237,0.15); }
  .auth-card input::placeholder { color: var(--muted); }

  .btn-submit {
    width: 100%; margin-top: 28px; padding: 14px;
    background: linear-gradient(135deg, #7c3aed, #06b6d4);
    border: none; border-radius: 999px;
    color: #fff; font-size: 16px; font-weight: 700;
    font-family: 'DM Sans', sans-serif; cursor: pointer;
    box-shadow: 0 6px 24px rgba(124,58,237,0.30); transition: all 0.3s;
  }
  .btn-submit:hover { transform: translateY(-2px); filter: brightness(1.1); }

  .auth-link {
    text-align: center; margin-top: 24px;
    font-size: 14px; color: var(--muted);
  }
  .auth-link a { color: #a78bfa; text-decoration: none; font-weight: 600; }
  .auth-link a:hover { text-decoration: underline; }

  .error-msg {
    background: rgba(248,113,113,0.10);
    border: 1px solid rgba(248,113,113,0.25);
    border-radius: 12px; padding: 12px 16px;
    color: #f87171; font-size: 14px; margin-bottom: 20px;
  }

  /* ── SCROLLBAR ── */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 999px; }
  ::-webkit-scrollbar-thumb:hover { background: #3d3d55; }

  /* ── SELECTION ── */
  ::selection { background: rgba(124,58,237,0.25); color: #f9fafb; }
</style>
{% block extra_css %}{% endblock %}
</head>
<body>

{% block body %}{% endblock %}

</body>
</html>
